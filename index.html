<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    apiKey:"AIzaSyDBVeYmkce_T3MuOnDSSh6-q1SkG_tMY_c",

    projectId:"catalogoj10-9f293",
    storageBucket:"catalogoj10-9f293.firebasestorage.app",
    messagingSenderId:"756032612761",
    appId:"1:756032612761:web:fa9886a1c9580514408b08"
  });

  const db = getFirestore(app);
  const REF = doc(db, "catalogo", "j10_catalogo");

  window._fbSave = async (data) => {
    try {
      const clean = JSON.parse(JSON.stringify(data));
      await setDoc(REF, clean);
      console.log("[FB] Guardado OK, productos:", clean.products?.length);
    } catch(e) {
      console.error("[FB] Error:", e.message);

    s => cb(s.exists() ? s.data() : null),
    e => { console.error("[FB] Listen error:", e.message); cb(null); }
  );

  window._fbReady = true;
  window.dispatchEvent(new Event("fb-ready"));
</script>

const toB64 = f => new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
const compress = (b64,maxW=600,q=0.65) => new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const ratio=Math.min(1,maxW/img.width);
    const c=document.createElement("canvas");
    c.width=img.width*ratio; c.height=img.height*ratio;
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    res(c.toDataURL("image/jpeg",q));
  };
  img.onerror=()=>res(b64);
  img.src=b64;
});
const pickFile=(accept,multi,cb)=>{const i=document.createElement("input");i.type="file";i.accept=accept;if(multi)i.multiple=true;i.onchange=e=>cb(e.target.files);i.click();};

/* ── Mini components ── */

}
function Tag({tag,sm=true}){
  if(!tag) return null;
  return <span style={{background:TCOLORS[tag]||"#6e6e73",color:"#fff",fontSize:sm?10:12,fontWeight:700,padding:"3px 8px",borderRadius:20}}>{tag}</span>;
}
function Slides({imgs=[]}){
  const [i,setI]=useState(0);
  if(!imgs.length) return <div style={{width:"100%",aspectRatio:"1/1",background:"#f5f5f7",borderRadius:10}}/>;
  return <div style={{position:"relative",borderRadius:10,overflow:"hidden"}}>
    <img src={imgs[i]} alt="" style={{width:"100%",aspectRatio:"1/1",objectFit:"cover",display:"block"}}/>
    {imgs.length>1&&<>
      <button onClick={e=>{e.stopPropagation();setI(v=>(v-1+imgs.length)%imgs.length);}} style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.4)",border:"none",color:"#fff",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      <button onClick={e=>{e.stopPropagation();setI(v=>(v+1)%imgs.length);}} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.4)",border:"none",color:"#fff",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      <div style={{position:"absolute",bottom:6,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4}}>
        {imgs.map((_,j)=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:j===i?"#fff":"rgba(255,255,255,0.5)"}}/>)}
      </div>
    </>}
  </div>;
}
function Pics({imgs=[],onChange}){
  const [url,setUrl]=useState("");
  const add=async files=>{
    const raw=await Promise.all(Array.from(files).map(toB64));
    const comp=await Promise.all(raw.map(b=>compress(b)));
    onChange([...imgs,...comp]);
  };
  const addUrl=()=>{if(url.trim()){onChange([...imgs,url.trim()]);setUrl("");}};
  const rm=i=>onChange(imgs.filter((_,j)=>j!==i));
  return <div>
    {imgs.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
      {imgs.map((src,i)=><div key={i} style={{position:"relative",width:72,height:72}}>
        <img src={src} alt="" style={{width:72,height:72,objectFit:"cover",borderRadius:8}}/>
        <button onClick={()=>rm(i)} style={{position:"absolute",top:-6,right:-6,background:"#ff3b30",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>×</button>
      </div>)}
    </div>}
    <div onClick={()=>pickFile("image/*",true,add)} style={{border:"1.5px dashed #d1d1d6",borderRadius:12,padding:"14px",textAlign:"center",cursor:"pointer",background:"#f5f5f7",marginBottom:8}}>
      <div style={{fontSize:20,marginBottom:4}}>📷</div>
      <div style={{color:"#555",fontSize:12}}>Subir foto(s)</div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <input style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1px solid #d1d1d6",fontSize:13,outline:"none",color:"#1d1d1f",background:"#fff",boxSizing:"border-box"}} placeholder="O pega URL..." value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addUrl();}}/>
      <button onClick={addUrl} style={{padding:"9px 14px",borderRadius:10,background:"#1d1d1f",color:"#fff",border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>+</button>
    </div>
  </div>;
}
function TagPicker({value,onChange,custom=[]}){
  const [ci,setCi]=useState("");
  const all=[...PTAGS,...custom.filter(t=>!PTAGS.includes(t))];
  return <div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
      <button onClick={()=>onChange("")} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(!value?"#1d1d1f":"#d1d1d6"),background:!value?"#1d1d1f":"transparent",color:!value?"#fff":"#555",cursor:"pointer",fontSize:12}}>Sin etiqueta</button>
      {all.map(t=><button key={t} onClick={()=>onChange(t)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid "+(value===t?(TCOLORS[t]||"#6e6e73"):"#d1d1d6"),background:value===t?(TCOLORS[t]||"#6e6e73"):"transparent",color:value===t?"#fff":"#555",cursor:"pointer",fontSize:12}}>{t}</button>)}
    </div>
    <div style={{display:"flex",gap:8}}>
      <input style={{flex:1,padding:"8px 12px",borderRadius:10,border:"1px solid #d1d1d6",fontSize:13,outline:"none",background:"#fff",color:"#1d1d1f",boxSizing:"border-box"}} placeholder="Etiqueta personalizada..." value={ci} onChange={e=>setCi(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&ci.trim()){onChange(ci.trim());setCi("");}}}/>
      <button onClick={()=>{if(ci.trim()){onChange(ci.trim());setCi("");}}} style={{padding:"8px 14px",borderRadius:10,background:"#1d1d1f",color:"#fff",border:"none",cursor:"pointer",fontSize:13}}>+</button>
    </div>
  </div>;
}
function Box({label,children}){
  return <div style={{marginBottom:24}}>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"#6e6e73",marginBottom:10,borderBottom:"1px solid #e5e5ea",paddingBottom:8}}>{label}</div>
    <div style={{background:"#fff",border:"1px solid #e5e5ea",borderRadius:16,padding:20}}>{children}</div>
  </div>;
}

/* ── App ── */
function App(){
  const [prods, setProds]   = useState(PRODS0);
  const [cats,  setCats]    = useState(CATS0);
  const [wa,    setWa]      = useState("573001234567");
  const [pw,    setPw]      = useState("admin123");
  const [logo,  setLogo]    = useState(null);
  const [banner,setBanner]  = useState(BANNER0);
  const [ctags, setCtags]   = useState([]);
  const [ready, setReady]   = useState(!!window._fbReady);
  const [loaded,setLoaded]  = useState(false);
  const [status,setStatus]  = useState("ok");

  const [view,  setView]    = useState("client");
  const [cat,   setCat]     = useState(null);
  const [q,     setQ]       = useState("");
  const [selP,  setSelP]    = useState(null);
  const [ci,    setCi]      = useState(0);
  const [editP, setEditP]   = useState(null);
  const [lPw,   setLPw]     = useState("");
  const [lErr,  setLErr]    = useState(false);
  const [eWa,   setEWa]     = useState(false);
  const [waIn,  setWaIn]    = useState("");
  const [ncN,   setNcN]     = useState("");
  const [ncI,   setNcI]     = useState("📦");
  const [sIP,   setSIP]     = useState(false);
  const [ecCat, setEcCat]   = useState(null);
  const [sEIP,  setSEIP]    = useState(false);
  const [uCat,  setUCat]    = useState("");
  const [uN,    setUN]      = useState("");
  const [uImgs, setUImgs]   = useState([]);
  const [uPr,   setUPr]     = useState("");
  const [uDe,   setUDe]     = useState("");
  const [uTag,  setUTag]    = useState("");
  const [cPw,   setCPw]     = useState(false);
  const [nPw,   setNPw]     = useState("");
  const [cnPw,  setCnPw]    = useState("");
  const [pErr,  setPErr]    = useState("");
  const [eBan,  setEBan]    = useState(false);
  const [ctIn,  setCtIn]    = useState("");

  const timer   = useRef(null);
  const snap    = useRef(null); // datos más recientes para el debounce
  const initing = useRef(true); // bloquea auto-save durante carga

  // Esperar Firebase
  useEffect(()=>{
    if(window._fbReady){setReady(true);return;}
    const h=()=>setReady(true);
    window.addEventListener("fb-ready",h);
    return()=>window.removeEventListener("fb-ready",h);
  },[]);

  // Cargar datos una sola vez con onSnapshot
  useEffect(()=>{
    if(!ready) return;
    const unsub = window._fbListen(data=>{
      if(!initing.current) return; // solo procesar la primera carga
      if(data){
        if(data.prods)  setProds(data.prods);
        if(data.cats)   setCats(data.cats);
        if(data.wa)     setWa(data.wa);
        if(data.pw)     setPw(data.pw);
        setLogo(data.logo||null);
        if(data.banner) setBanner(data.banner);
        if(data.ctags)  setCtags(data.ctags);
      } else {
        // Primera vez: escribir defaults
        window._fbSave({prods:PRODS0,cats:CATS0,wa:"573001234567",pw:"admin123",logo:null,banner:BANNER0,ctags:[]});
      }
      setLoaded(true);
      setTimeout(()=>{ initing.current=false; },400);
    });
    return()=>unsub();
  },[ready]);

  // Auto-save con debounce 1.5s
  const save = (p,c,w,pass,l,b,ct) => {
    if(initing.current) return;
    const d={prods:p,cats:c,wa:w,pw:pass,logo:l,banner:b,ctags:ct};
    snap.current=d;
    setStatus("pending");
    if(timer.current) clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      setStatus("saving");
      await window._fbSave(snap.current);
      setStatus("ok");
    },1500);
  };

  // Helpers que actualizan estado y disparan save
  const sProds  = v=>{setProds(v);  save(v,cats,wa,pw,logo,banner,ctags);};
  const sCats   = v=>{setCats(v);   save(prods,v,wa,pw,logo,banner,ctags);};
  const sWa     = v=>{setWa(v);     save(prods,cats,v,pw,logo,banner,ctags);};
  const sPw     = v=>{setPw(v);     save(prods,cats,wa,v,logo,banner,ctags);};
  const sLogo   = v=>{setLogo(v);   save(prods,cats,wa,pw,v,banner,ctags);};
  const sBanner = v=>{setBanner(v); save(prods,cats,wa,pw,logo,v,ctags);};
  const sCtags  = v=>{setCtags(v);  save(prods,cats,wa,pw,logo,banner,v);};

  // Acciones
  const toggleP = id => sProds(prods.map(p=>p.id===id?{...p,enabled:!p.enabled}:p));
  const delP    = id => sProds(prods.filter(p=>p.id!==id));
  const doEdit  = ()=>{
    if(!editP?.name.trim()||!editP?.imgs?.length) return;
    sProds(prods.map(p=>p.id===editP.id?{...p,...editP}:p));
    setEditP(null);
  };
  const addP = ()=>{
    if(!uN.trim()||!uImgs.length||!uCat) return;
    const np={id:Date.now(),catId:parseInt(uCat),name:uN.trim(),imgs:uImgs,enabled:true,price:uPr.trim(),description:uDe.trim(),tag:uTag||""};
    sProds([...prods,np]);
    setUN("");setUImgs([]);setUCat("");setUPr("");setUDe("");setUTag("");
  };
  const addCat = ()=>{
    if(!ncN.trim()) return;
    sCats([...cats,{id:Date.now(),name:ncN.trim(),icon:ncI}]);
    setNcN("");setNcI("📦");setSIP(false);
  };
  const saveEC = ()=>{
    if(!ecCat?.name.trim()) return;
    sCats(cats.map(c=>c.id===ecCat.id?{...c,name:ecCat.name.trim(),icon:ecCat.icon}:c));
    setEcCat(null);setSEIP(false);
  };
  const delCat = id=>{
    sCats(cats.filter(c=>c.id!==id));
    sProds(prods.filter(p=>p.catId!==id));
    if(cat===id) setCat(null);
  };
  const login = ()=>{
    if(lPw===pw){setView("admin");setLErr(false);setLPw("");}
    else setLErr(true);
  };
  const savePw = ()=>{
    if(nPw.length<6){setPErr("Mínimo 6 caracteres");return;}
    if(nPw!==cnPw){setPErr("No coinciden");return;}
    sPw(nPw);setCPw(false);setNPw("");setCnPw("");setPErr("");
  };
  const addCt = ()=>{if(ctIn.trim()&&!ctags.includes(ctIn.trim()))sCtags([...ctags,ctIn.trim()]);setCtIn("");};
  const rmCt  = t=>sCtags(ctags.filter(x=>x!==t));

  const visible=useMemo(()=>{
    let l=view==="admin"?[...prods]:prods.filter(p=>p.enabled);
    if(cat!=null) l=l.filter(p=>p.catId===cat);
    if(q.trim()) l=l.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    return l;
  },[prods,cat,q,view]);

  const clientCats=cats.filter(c=>prods.some(p=>p.catId===c.id&&p.enabled));

  const I={width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid #d1d1d6",fontSize:14,outline:"none",color:"#1d1d1f",background:"#fff",boxSizing:"border-box",marginBottom:10};
  const Btn={padding:"10px 20px",borderRadius:10,background:"#1d1d1f",color:"#fff",border:"none",fontWeight:600,cursor:"pointer",fontSize:14};
  const Gho={padding:"10px 20px",borderRadius:10,background:"#f5f5f7",color:"#1d1d1f",border:"none",fontWeight:500,cursor:"pointer",fontSize:14};

  const Dot=()=>{
    if(!ready)           return <span style={{fontSize:12,color:"#aaa"}}>⏳</span>;
    if(status==="saving") return <span style={{fontSize:12,color:"#007aff"}}>☁️ Guardando...</span>;
    if(status==="pending")return <span style={{fontSize:12,color:"#ff9500"}}>● Pendiente</span>;
    return <span style={{fontSize:12,color:"#34c759"}}>✓ En la nube</span>;
  };

  if(!loaded) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <Logo size={52}/><div style={{color:"#aaa",fontSize:14}}>{ready?"Cargando...":"Conectando con Firebase..."}</div>
  </div>;

  if(view==="login") return <div style={{minHeight:"100vh",background:"#f5f5f7",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{background:"#fff",borderRadius:20,padding:"48px 40px",width:340,maxWidth:"92vw",boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:36,marginBottom:8}}>🔐</div>
        <div style={{fontSize:22,fontWeight:700}}>Panel Admin</div>
      </div>
      <input type="password" placeholder="Contraseña" value={lPw} onChange={e=>setLPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")login();}} style={{...I,border:lErr?"1px solid #ff3b30":"1px solid #d1d1d6",marginBottom:lErr?6:16}}/>
      {lErr&&<div style={{color:"#ff3b30",fontSize:13,marginBottom:12}}>Contraseña incorrecta</div>}
      <button onClick={login} style={{...Btn,width:"100%",padding:14,borderRadius:12,fontSize:15}}>Entrar</button>
      <button onClick={()=>setView("client")} style={{...Gho,width:"100%",padding:13,marginTop:10,borderRadius:12}}>← Volver</button>
    </div>
  </div>;

  return <div style={{minHeight:"100vh",background:view==="admin"?"#f5f5f7":"#fff",paddingBottom:80}}>

    {/* HEADER */}

              {imgs.length>1&&<>
                <button onClick={e=>{e.stopPropagation();setCi(i=>(i-1+imgs.length)%imgs.length);}} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.4)",border:"none",color:"#fff",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <button onClick={e=>{e.stopPropagation();setCi(i=>(i+1)%imgs.length);}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.4)",border:"none",color:"#fff",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                <div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
                  {imgs.map((_,i)=><div key={i} onClick={e=>{e.stopPropagation();setCi(i);}} style={{width:7,height:7,borderRadius:"50%",background:i===ci?"#1d1d1f":"rgba(0,0,0,0.25)",cursor:"pointer"}}/>)}
                </div>
                <div style={{display:"flex",gap:6,marginTop:8,overflowX:"auto",paddingBottom:2}}>
                  {imgs.map((src,i)=><img key={i} src={src} alt="" onClick={e=>{e.stopPropagation();setCi(i);}} style={{width:52,height:52,objectFit:"cover",borderRadius:8,flexShrink:0,border:i===ci?"2px solid #1d1d1f":"2px solid transparent",cursor:"pointer"}}/>)}
                </div>
              </>}
            </div>;
          })()}
          <button onClick={()=>setSelP(null)} style={{position:"absolute",top:18,right:18,background:"#fff",border:"none",borderRadius:"50%",width:32,height:32,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",zIndex:10}}>×</button>
        </div>
        <div style={{padding:"16px 20px 24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <div style={{fontSize:11,color:"#6e6e73"}}>{cats.find(c=>c.id===selP.catId)?.name}</div>
            {selP.tag&&<Tag tag={selP.tag}/>}
          </div>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{selP.name}</div>
          {selP.price&&<div style={{fontSize:18,fontWeight:800,color:"#1d1d1f",marginBottom:8}}>{selP.price}</div>}
          {selP.description&&<div style={{fontSize:14,color:"#6e6e73",lineHeight:1.6,marginBottom:16}}>{selP.description}</div>}
          <a href={"https://wa.me/"+wa+"?text=Hola! Me interesa: "+selP.name} target="_blank" rel="noreferrer"
            style={{display:"block",textAlign:"center",padding:14,background:"#25d366",color:"#fff",borderRadius:12,textDecoration:"none",fontWeight:600,fontSize:15}}>
            💬 Consultar por WhatsApp
          </a>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
