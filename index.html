<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distribuciones J10 — Catálogo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #fff; }
    textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const DEFAULT_CATEGORIES = [
  { id: 1,  name: "Sala",              icon: "🛋️" },
  { id: 2,  name: "Dormitorio",        icon: "🛏️" },
  { id: 3,  name: "Exterior",          icon: "🌿" },
  { id: 4,  name: "Cocina",            icon: "🍳" },
  { id: 5,  name: "Baño",              icon: "🛁" },
  { id: 6,  name: "Oficina",           icon: "💻" },
  { id: 7,  name: "Iluminación",       icon: "💡" },
  { id: 8,  name: "Decoración",        icon: "🖼️" },
  { id: 9,  name: "Almacenamiento",    icon: "🗄️" },
  { id: 10, name: "Textiles",          icon: "🧶" },
  { id: 11, name: "Jardín",            icon: "🪴" },
  { id: 12, name: "Infantil",          icon: "🧸" },
  { id: 13, name: "Comedor",           icon: "🍽️" },
  { id: 14, name: "Entretenimiento",   icon: "🎮" },
  { id: 15, name: "Tecnología",        icon: "📱" },
  { id: 16, name: "Ropa y Moda",       icon: "👗" },
  { id: 17, name: "Accesorios",        icon: "👜" },
  { id: 18, name: "Deportes",          icon: "🏋️" },
  { id: 19, name: "Mascotas",          icon: "🐾" },
  { id: 20, name: "Ofertas",           icon: "🔥" },
];
const DEFAULT_PRODUCTS = [
  { id: 1, catId: 1, name: "Sofá Moderno", imgs: ["https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600"], enabled: true, price: "", description: "", tag: "" },
  { id: 2, catId: 1, name: "Mesa de Centro", imgs: ["https://images.unsplash.com/photo-1506439773649-6e0eb8cfb237?w=600"], enabled: true, price: "", description: "", tag: "" },
  { id: 4, catId: 2, name: "Cama King", imgs: ["https://images.unsplash.com/photo-1505693314120-0d443867891c?w=600"], enabled: true, price: "", description: "", tag: "" },
  { id: 6, catId: 3, name: "Silla de Jardín", imgs: ["https://images.unsplash.com/photo-1600566752355-35792bedcfea?w=600"], enabled: true, price: "", description: "", tag: "" },
];
const ICONS = ["📦","🛋️","🛏️","🌿","🪑","🚪","🪞","🛁","🍳","💡","🖼️","🧺","🪴","🏡","🛠️","🎨","📐","🪟","🧸","🛒","⭐","🔥","💎","✨","🎁","👔","👗","👟","💍","👜","🕶️","🧴","🍶","🥗","🍕","☕","🎵","📷","💻","📱","🎮","🚗","🌸","🐾","🧩"];
const DEFAULT_BANNER = "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1200";
const PRESET_TAGS = ["Nuevo", "Promo", "SALE", "Ahorro"];
const TAG_COLORS = { "Nuevo": "#007aff", "Promo": "#ff9500", "SALE": "#ff3b30", "Ahorro": "#34c759" };
const SK = "j10_catalogo_final";

const loadData = () => {
  try {
    const r = localStorage.getItem(SK);
    if (!r) return null;
    const d = JSON.parse(r);
    // validar que tenga datos reales
    if (!d || typeof d !== "object") return null;
    return d;
  } catch { return null; }
};
const saveData = d => {
  try {
    const str = JSON.stringify(d);
    localStorage.setItem(SK, str);
    // verificar que se guardó
    const check = localStorage.getItem(SK);
    if (!check) console.error("Error: no se pudo guardar en localStorage");
  } catch(e) { console.error("Error guardando:", e); }
};
const toB64 = f => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(f); });
const pickFile = (accept, multiple, cb) => { const i = document.createElement("input"); i.type = "file"; i.accept = accept; if (multiple) i.multiple = true; i.onchange = e => cb(e.target.files); i.click(); };

function LogoJ10({ size = 40, color = "#1d1d1f" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 200 200" fill="none">
      <path d="M100 8 A92 92 0 0 0 8 100" stroke={color} strokeWidth="18" strokeLinecap="round" fill="none"/>
      <path d="M8 100 A92 92 0 0 0 100 192" stroke={color} strokeWidth="18" strokeLinecap="round" fill="none"/>
      <path d="M100 192 A92 92 0 0 0 175 152" stroke={color} strokeWidth="18" strokeLinecap="round" fill="none"/>
      <path d="M155 34 A92 92 0 0 1 192 100" stroke={color} strokeWidth="18" strokeLinecap="round" fill="none"/>
      <rect x="52" y="62" width="18" height="72" rx="2" fill={color}/>
      <path d="M52 126 Q52 142 38 142 Q30 142 26 136" stroke={color} strokeWidth="14" strokeLinecap="round" fill="none"/>
      <rect x="82" y="54" width="16" height="84" rx="2" fill={color}/>
      <path d="M82 62 L72 72" stroke={color} strokeWidth="10" strokeLinecap="round"/>
      <rect x="108" y="54" width="52" height="84" rx="26" fill={color}/>
      <rect x="122" y="68" width="24" height="56" rx="12" fill="white"/>
    </svg>
  );
}

function TagBadge({ tag, size = "sm" }) {
  if (!tag) return null;
  const bg = TAG_COLORS[tag] || "#6e6e73";
  return <span style={{ background: bg, color: "#fff", fontSize: size === "sm" ? 10 : 12, fontWeight: 700, padding: "3px 8px", borderRadius: 20, letterSpacing: 0.3 }}>{tag}</span>;
}

function ImageCarousel({ imgs = [] }) {
  const [idx, setIdx] = useState(0);
  if (!imgs.length) return <div style={{ width: "100%", aspectRatio: "1/1", background: "#f5f5f7", borderRadius: 10 }} />;
  return (
    <div style={{ position: "relative", borderRadius: 10, overflow: "hidden" }}>
      <img src={imgs[idx]} alt="" style={{ width: "100%", aspectRatio: "1/1", objectFit: "cover", display: "block" }} />
      {imgs.length > 1 && <>
        <button onClick={e => { e.stopPropagation(); setIdx(i => (i - 1 + imgs.length) % imgs.length); }}
          style={{ position: "absolute", left: 6, top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,0.4)", border: "none", color: "#fff", borderRadius: "50%", width: 28, height: 28, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
        <button onClick={e => { e.stopPropagation(); setIdx(i => (i + 1) % imgs.length); }}
          style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,0.4)", border: "none", color: "#fff", borderRadius: "50%", width: 28, height: 28, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
        <div style={{ position: "absolute", bottom: 6, left: "50%", transform: "translateX(-50%)", display: "flex", gap: 4 }}>
          {imgs.map((_, i) => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: i === idx ? "#fff" : "rgba(255,255,255,0.5)" }} />)}
        </div>
      </>}
    </div>
  );
}

function MultiImagePicker({ imgs = [], onChange }) {
  const [url, setUrl] = useState("");
  const addFiles = async files => { const b = await Promise.all(Array.from(files).map(toB64)); onChange([...imgs, ...b]); };
  const addUrl = () => { if (url.trim()) { onChange([...imgs, url.trim()]); setUrl(""); } };
  const rm = i => onChange(imgs.filter((_, j) => j !== i));
  return (
    <div>
      {imgs.length > 0 && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
          {imgs.map((img, i) => (
            <div key={i} style={{ position: "relative", width: 72, height: 72 }}>
              <img src={img} alt="" style={{ width: 72, height: 72, objectFit: "cover", borderRadius: 8, display: "block" }} />
              <button onClick={() => rm(i)} style={{ position: "absolute", top: -6, right: -6, background: "#ff3b30", border: "none", color: "#fff", borderRadius: "50%", width: 20, height: 20, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>×</button>
            </div>
          ))}
        </div>
      )}
      <div onClick={() => pickFile("image/*", true, addFiles)} style={{ border: "1.5px dashed #d1d1d6", borderRadius: 12, padding: "14px 16px", textAlign: "center", cursor: "pointer", background: "#f5f5f7", marginBottom: 8 }}>
        <div style={{ fontSize: 20, marginBottom: 4 }}>📷</div>
        <div style={{ color: "#555", fontSize: 12 }}>Subir foto(s)</div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input style={{ flex: 1, padding: "9px 12px", borderRadius: 10, border: "1px solid #d1d1d6", fontSize: 13, outline: "none", color: "#1d1d1f", background: "#fff", boxSizing: "border-box" }}
          placeholder="O pega URL..." value={url} onChange={e => setUrl(e.target.value)} onKeyDown={e => { if (e.key === "Enter") addUrl(); }} />
        <button onClick={addUrl} style={{ padding: "9px 14px", borderRadius: 10, background: "#1d1d1f", color: "#fff", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+</button>
      </div>
    </div>
  );
}

function TagSelector({ value, onChange, customTags = [] }) {
  const [ci, setCi] = useState("");
  const all = [...PRESET_TAGS, ...customTags.filter(t => !PRESET_TAGS.includes(t))];
  return (
    <div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
        <button onClick={() => onChange("")} style={{ padding: "5px 12px", borderRadius: 20, border: "1px solid " + (!value ? "#1d1d1f" : "#d1d1d6"), background: !value ? "#1d1d1f" : "transparent", color: !value ? "#fff" : "#555", cursor: "pointer", fontSize: 12 }}>Sin etiqueta</button>
        {all.map(t => (
          <button key={t} onClick={() => onChange(t)} style={{ padding: "5px 12px", borderRadius: 20, border: "1px solid " + (value === t ? (TAG_COLORS[t] || "#6e6e73") : "#d1d1d6"), background: value === t ? (TAG_COLORS[t] || "#6e6e73") : "transparent", color: value === t ? "#fff" : "#555", cursor: "pointer", fontSize: 12 }}>{t}</button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input style={{ flex: 1, padding: "8px 12px", borderRadius: 10, border: "1px solid #d1d1d6", fontSize: 13, outline: "none", background: "#fff", color: "#1d1d1f", boxSizing: "border-box" }}
          placeholder="Etiqueta personalizada..." value={ci} onChange={e => setCi(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && ci.trim()) { onChange(ci.trim()); setCi(""); } }} />
        <button onClick={() => { if (ci.trim()) { onChange(ci.trim()); setCi(""); } }} style={{ padding: "8px 14px", borderRadius: 10, background: "#1d1d1f", color: "#fff", border: "none", cursor: "pointer", fontSize: 13 }}>+</button>
      </div>
    </div>
  );
}

function AdminSection({ label, children }) {
  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#6e6e73", marginBottom: 10, borderBottom: "1px solid #e5e5ea", paddingBottom: 8 }}>{label}</div>
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 16, padding: 20 }}>{children}</div>
    </div>
  );
}

function App() {
  const [products, setProducts] = useState(DEFAULT_PRODUCTS);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [whatsapp, setWhatsapp] = useState("573001234567");
  const [adminPassword, setAdminPassword] = useState("admin123");
  const [logoImg, setLogoImg] = useState(null);
  const [bannerImg, setBannerImg] = useState(DEFAULT_BANNER);
  const [customTags, setCustomTags] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [hasChanges, setHasChanges] = useState(false);
  const [view, setView] = useState("client");
  const [activeCat, setActiveCat] = useState(null);
  const [search, setSearch] = useState("");
  const [selProd, setSelProd] = useState(null);
  const [carIdx, setCarIdx] = useState(0);
  const [editProd, setEditProd] = useState(null);
  const [loginPw, setLoginPw] = useState("");
  const [loginErr, setLoginErr] = useState(false);
  const [editWa, setEditWa] = useState(false);
  const [waIn, setWaIn] = useState("");
  const [newCatName, setNewCatName] = useState("");
  const [newCatIcon, setNewCatIcon] = useState("📦");
  const [showIcons, setShowIcons] = useState(false);
  const [upCat, setUpCat] = useState("");
  const [upName, setUpName] = useState("");
  const [upImgs, setUpImgs] = useState([]);
  const [upPrice, setUpPrice] = useState("");
  const [upDesc, setUpDesc] = useState("");
  const [upTag, setUpTag] = useState("");
  const [chPw, setChPw] = useState(false);
  const [newPw, setNewPw] = useState("");
  const [confPw, setConfPw] = useState("");
  const [pwErr, setPwErr] = useState("");
  const [editBanner, setEditBanner] = useState(false);
  const [ctIn, setCtIn] = useState("");
  const bannerUrlRef = useRef();

  useEffect(() => {
    const d = loadData();
    if (d) {
      if (d.products) setProducts(d.products);
      if (d.categories) setCategories(d.categories);
      if (d.whatsapp) setWhatsapp(d.whatsapp);
      if (d.adminPassword) setAdminPassword(d.adminPassword);
      if (d.logoImg) setLogoImg(d.logoImg);
      if (d.bannerImg) setBannerImg(d.bannerImg);
      if (d.customTags) setCustomTags(d.customTags);
    }
    setLoaded(true);
  }, []);

  // Auto-guardar cada vez que cambian los datos, solo después de cargar
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (!loaded) return;
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    const data = { products, categories, whatsapp, adminPassword, logoImg, bannerImg, customTags };
    saveData(data);
    setHasChanges(false);
  }, [products, categories, whatsapp, adminPassword, logoImg, bannerImg, customTags]);

  const saveAll = () => {
    setSaving(true);
    const data = { products, categories, whatsapp, adminPassword, logoImg, bannerImg, customTags };
    saveData(data);
    setHasChanges(false);
    setTimeout(() => setSaving(false), 800);
  };

  const mark = () => setHasChanges(true);
  // updP y updC guardan automáticamente via el useEffect de auto-guardado
  const updP = fn => { setProducts(p => fn(p)); mark(); };
  const updC = fn => { setCategories(c => fn(c)); mark(); };

  const toggleProd = id => updP(ps => ps.map(p => p.id === id ? { ...p, enabled: !p.enabled } : p));
  const delProd = id => updP(ps => ps.filter(p => p.id !== id));
  const saveEdit = () => {
    if (!editProd?.name.trim() || !editProd?.imgs?.length) return;
    updP(ps => ps.map(p => p.id === editProd.id ? { ...p, ...editProd } : p));
    setEditProd(null);
  };
  const addProd = () => {
    if (!upName.trim() || !upImgs.length || !upCat) return;
    updP(ps => [...ps, { id: Date.now(), catId: parseInt(upCat), name: upName.trim(), imgs: upImgs, enabled: true, price: upPrice.trim(), description: upDesc.trim(), tag: upTag }]);
    setUpName(""); setUpImgs([]); setUpCat(""); setUpPrice(""); setUpDesc(""); setUpTag("");
  };
  const addCat = () => {
    if (!newCatName.trim()) return;
    updC(cs => [...cs, { id: Date.now(), name: newCatName.trim(), icon: newCatIcon }]);
    setNewCatName(""); setNewCatIcon("📦"); setShowIcons(false);
  };
  const delCat = id => {
    updC(cs => cs.filter(c => c.id !== id));
    updP(ps => ps.filter(p => p.catId !== id));
    if (activeCat === id) setActiveCat(null);
  };
  const handleLogin = () => {
    if (loginPw === adminPassword) { setView("admin"); setLoginErr(false); setLoginPw(""); }
    else setLoginErr(true);
  };
  const savePw = () => {
    if (newPw.length < 6) { setPwErr("Mínimo 6 caracteres"); return; }
    if (newPw !== confPw) { setPwErr("No coinciden"); return; }
    setAdminPassword(newPw); mark(); setChPw(false); setNewPw(""); setConfPw(""); setPwErr("");
  };
  const addCt = () => {
    if (ctIn.trim() && !customTags.includes(ctIn.trim())) { setCustomTags(t => [...t, ctIn.trim()]); mark(); }
    setCtIn("");
  };
  const rmCt = t => { setCustomTags(ts => ts.filter(x => x !== t)); mark(); };

  const visible = useMemo(() => {
    let l = view === "admin" ? products : products.filter(p => p.enabled);
    if (activeCat) l = l.filter(p => p.catId === activeCat);
    if (search) l = l.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    return l;
  }, [products, activeCat, search, view]);

  const clientCats = categories.filter(c => products.some(p => p.catId === c.id && p.enabled));

  const inp = { width: "100%", padding: "11px 14px", borderRadius: 10, border: "1px solid #d1d1d6", fontSize: 14, outline: "none", color: "#1d1d1f", background: "#fff", boxSizing: "border-box", marginBottom: 10 };
  const pri = { padding: "10px 20px", borderRadius: 10, background: "#1d1d1f", color: "#fff", border: "none", fontWeight: 600, cursor: "pointer", fontSize: 14 };
  const gho = { padding: "10px 20px", borderRadius: 10, background: "#f5f5f7", color: "#1d1d1f", border: "none", fontWeight: 500, cursor: "pointer", fontSize: 14 };

  if (!loaded) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <LogoJ10 size={52} /><div style={{ color: "#aaa", fontSize: 14 }}>Cargando...</div>
    </div>
  );

  if (view === "login") return (
    <div style={{ minHeight: "100vh", background: "#f5f5f7", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ background: "#fff", borderRadius: 20, padding: "48px 40px", width: 340, maxWidth: "92vw", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔐</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>Panel Admin</div>
        </div>
        <input type="password" placeholder="Contraseña" value={loginPw}
          onChange={e => setLoginPw(e.target.value)} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
          style={{ ...inp, border: loginErr ? "1px solid #ff3b30" : "1px solid #d1d1d6", marginBottom: loginErr ? 6 : 16 }} />
        {loginErr && <div style={{ color: "#ff3b30", fontSize: 13, marginBottom: 12 }}>Contraseña incorrecta</div>}
        <button onClick={handleLogin} style={{ ...pri, width: "100%", padding: 14, borderRadius: 12, fontSize: 15 }}>Entrar</button>
        <button onClick={() => setView("client")} style={{ ...gho, width: "100%", padding: 13, marginTop: 10, borderRadius: 12 }}>← Volver al catálogo</button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: view === "admin" ? "#f5f5f7" : "#fff", paddingBottom: 80 }}>

      {/* HEADER */}
      <div style={{ background: "rgba(255,255,255,0.92)", backdropFilter: "blur(20px)", borderBottom: "1px solid #e5e5ea", padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 56, position: "sticky", top: 0, zIndex: 100 }}>
        {view === "admin"
          ? <div style={{ fontSize: 16, fontWeight: 700 }}>⚙️ Administración</div>
          : <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {logoImg ? <img src={logoImg} alt="logo" style={{ width: 34, height: 34, objectFit: "contain", borderRadius: 6 }} /> : <LogoJ10 size={32} />}
              <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.3, whiteSpace: "nowrap" }}>Distribuciones J10</div>
            </div>}
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {view === "admin" && hasChanges && !saving && (
            <button onClick={saveAll} style={{ ...pri, padding: "8px 18px", fontSize: 13, borderRadius: 10, background: "#ff9500" }}>💾 Guardar cambios</button>
          )}
          {view === "admin" && !hasChanges && !saving && <span style={{ fontSize: 12, color: "#34c759" }}>✓ Al día</span>}
          {saving && <span style={{ fontSize: 12, color: "#007aff" }}>✓ Guardado</span>}
          {view === "admin"
            ? <button onClick={() => setView("client")} style={{ ...gho, padding: "7px 14px", fontSize: 13, borderRadius: 8 }}>← Salir</button>
            : <button onClick={() => setView("login")} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 500, color: "#007aff" }}>Admin</button>}
        </div>
      </div>

      {/* CLIENT */}
      {view === "client" && <>
        <div style={{ position: "relative", height: 360, overflow: "hidden", background: "#1d1d1f" }}>
          {bannerImg && <img src={bannerImg} alt="banner" style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.5, display: "block" }} />}
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: 24 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.7)", marginBottom: 10, letterSpacing: 2 }}>COLECCIÓN</div>
            <div style={{ fontSize: 44, fontWeight: 800, color: "#fff", letterSpacing: -1.5, lineHeight: 1.05, marginBottom: 10 }}>
              {activeCat ? categories.find(c => c.id === activeCat)?.name : "Bienvenidos"}
            </div>

              <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{selProd.name}</div>
              {selProd.price && <div style={{ fontSize: 18, fontWeight: 800, color: "#1d1d1f", marginBottom: 8 }}>{selProd.price}</div>}
              {selProd.description && <div style={{ fontSize: 14, color: "#6e6e73", lineHeight: 1.6, marginBottom: 16 }}>{selProd.description}</div>}
              <a href={"https://wa.me/" + whatsapp + "?text=Hola! Me interesa: " + selProd.name} target="_blank" rel="noreferrer"
                style={{ display: "block", textAlign: "center", padding: 14, background: "#25d366", color: "#fff", borderRadius: 12, textDecoration: "none", fontWeight: 600, fontSize: 15 }}>
                💬 Consultar por WhatsApp
              </a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
